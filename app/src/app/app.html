<div class="shell">
  <nav class="sidebar">
    <div class="brand">
      <img src="icon.png" alt="" width="30" height="30" />
      <span class="brand-name">Freesound<br />Connect</span>
    </div>
    <div class="nav-items">
      <a
        class="nav-item"
        routerLink="/search"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <lucide-icon name="search" [size]="19"></lucide-icon>
        <span>Search</span>
      </a>
      <a class="nav-item" routerLink="/playlists" routerLinkActive="active">
        <lucide-icon name="library" [size]="19"></lucide-icon>
        <span>Playlists</span>
      </a>
    </div>
    <div class="sidebar-foot faint">v3.0.0</div>
  </nav>

  <div class="main">
    <header class="header">
      <span class="spacer"></span>

      <button class="btn cart-btn" (click)="toggleCart()" title="Open your shotlist">
        <lucide-icon name="heart" [size]="15"></lucide-icon>
        Shotlist
        <span class="badge">{{ library.shotCount() }}</span>
      </button>

      @if (auth.isLoggedIn) {
        <div class="account">
          @if (auth.state().avatarUrl) {
            <img class="avatar" [src]="auth.state().avatarUrl" alt="" />
          } @else {
            <span class="avatar avatar-fallback">
              <lucide-icon name="user" [size]="15"></lucide-icon>
            </span>
          }
          <span class="username">{{ auth.state().username || 'Logged in' }}</span>
          <button class="btn btn-ghost btn-sm" (click)="logout()">Log out</button>
        </div>
      } @else {
        <button class="btn btn-primary" (click)="login()" [disabled]="auth.busy()">
          Log in with Freesound
        </button>
      }
    </header>

    @if (cartOpen()) {
      <app-shotlist-popover (close)="cartOpen.set(false)"></app-shotlist-popover>
    }

    <main class="content">
      <router-outlet></router-outlet>
    </main>

    <app-player-bar></app-player-bar>

    <div class="statusbar">{{ toast.status() }}</div>
  </div>

  @if (auth.busy()) {
    <app-login-dialog></app-login-dialog>
  }

  <div class="toasts">
    @for (t of toast.toasts(); track t.id) {
      <div class="toast toast-{{ t.kind }}" (click)="toast.dismiss(t.id)">
        <lucide-icon
          [name]="t.kind === 'error' ? 'triangle-alert' : 'info'"
          [size]="15"
        ></lucide-icon>
        <span>{{ t.text }}</span>
      </div>
    }
  </div>
</div>
