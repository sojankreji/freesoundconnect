appId: com.sojankreji.freesoundconnect
productName: Freesound Connect
files:
  - dist/freesoundconnect/browser/**
  - dist-electron/**
  - package.json
directories:
  buildResources: build
  output: release
mac:
  target:
    - dmg
    - zip
  icon: build/icon.icns
  category: public.app-category.video
win:
  target:
    - nsis
  icon: build/icon.ico
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: AudioVideo
