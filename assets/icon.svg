<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232a5c"/>
      <stop offset="1" stop-color="#0d1230"/>
    </linearGradient>
    <linearGradient id="wave" gradientUnits="userSpaceOnUse"
                    x1="104" y1="0" x2="416" y2="0">
      <stop offset="0" stop-color="#35e0c3"/>
      <stop offset="1" stop-color="#4f9dff"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="110" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="110" fill="none"
        stroke="#ffffff" stroke-opacity="0.08" stroke-width="4"/>

  <!-- waveform -->
  <g stroke="url(#wave)" stroke-width="26" stroke-linecap="round">
    <line x1="104" y1="216" x2="104" y2="296"/>
    <line x1="156" y1="176" x2="156" y2="336"/>
    <line x1="208" y1="128" x2="208" y2="384"/>
    <line x1="260" y1="96"  x2="260" y2="416"/>
    <line x1="312" y1="152" x2="312" y2="360"/>
    <line x1="364" y1="196" x2="364" y2="316"/>
    <line x1="416" y1="232" x2="416" y2="280"/>
  </g>

  <!-- playhead dot echoing Resolve's timeline cursor -->
  <circle cx="260" cy="256" r="16" fill="#ffffff" fill-opacity="0.92"/>
</svg>
