name: Build Electron app

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

defaults:
  run:
    working-directory: app

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack npm ci

      - name: Write OAuth credentials
        shell: bash
        run: |
          cat > electron/credentials.json <<EOF
          { "clientId": "${{ secrets.FREESOUND_CLIENT_ID }}", "clientSecret": "${{ secrets.FREESOUND_CLIENT_SECRET }}" }
          EOF

      - name: Build and package
        run: corepack npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: FreesoundConnect-${{ runner.os }}
          path: |
            app/release/*.dmg
            app/release/*.zip
            app/release/*.exe
            app/release/*.AppImage

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
