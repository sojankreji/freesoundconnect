name: Build executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: FreesoundConnect-macOS
          - os: windows-latest
            artifact: FreesoundConnect-Windows
          - os: ubuntu-latest
            artifact: FreesoundConnect-Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 \
            libgstreamer1.0-0 gstreamer1.0-plugins-good

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          ./scripts/build.sh
          ditto -c -k --keepParent "dist/Freesound Connect.app" "dist/${{ matrix.artifact }}.zip"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          .\scripts\build.ps1
          Compress-Archive -Path dist\FreesoundConnect.exe -DestinationPath dist\${{ matrix.artifact }}.zip

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          ./scripts/build.sh
          cd dist && zip ${{ matrix.artifact }}.zip freesoundconnect

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
